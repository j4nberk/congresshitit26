<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CekilisHitit</title>
  <script>
    window.onerror = function (msg, source, line, col, error) {
      if (!document.getElementById('error-log')) {
        var div = document.createElement('div');
        div.id = 'error-log';
        div.style = 'position:fixed;top:0;left:0;z-index:9999;background:white;color:red;padding:20px;width:100%;height:100vh;overflow:auto;word-wrap:break-word;';
        document.body.appendChild(div);
      }
      document.getElementById('error-log').innerHTML += '<p>' + msg + ' at ' + line + ':' + col + '</p>';
    };
    window.addEventListener('unhandledrejection', function (event) {
      window.onerror('Unhandled Rejection: ' + event.reason, '', 0, 0, null);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
